  - id: internal/xds/watchers/sds_setup_test.go:TestSetupSDSSecrets_WithCertificates
    file: internal/xds/watchers/sds_setup_test.go
    symbol: TestSetupSDSSecrets_WithCertificates
    package: watchers
    language: go
    doc: "TestSetupSDSSecrets_WithCertificates verifies the CURRENT setupSDSSecrets\ncontract. AUTHORITY = code: commit 2992c06 (\"publish internal-client-cert SDS\nsecret for upstream mTLS\") and 6070dd4 (\"default filter chain must serve\ninternal cert, not LE cert\") deliberately changed this function to (a) emit\ninternal-CA server AND client certs and (b) source them from the canonical PKI\npaths (GetStateRootDir/pki/...), NOT from listener.CertFile. This test predated\nboth and was stale (it expected [server, CA] at the listener's path). Aligned\nto the real contract and made hermetic via a fixture state root."
  - id: internal/xds/watchers/sds_setup_test.go:TestSetupSDSSecrets_WithoutCABundle
    file: internal/xds/watchers/sds_setup_test.go
    symbol: TestSetupSDSSecrets_WithoutCABundle
    package: watchers
    language: go
    doc: "TestSetupSDSSecrets_WithoutCABundle: the CA-bundle secret is optional —\nincluded only when the canonical pki/ca.crt exists. AUTHORITY = code: the CA\nbundle is gated by fileExists(GetStateRootDir/pki/ca.crt), and the internal\nserver+client certs (2992c06) are always emitted. The old test expected a\nsingle secret and was stale; with no ca.crt fixture, the contract is 2 secrets\n(server + client), no CA bundle. listener.IssuerFile is ignored by the SUT."
  - id: internal/xds/watchers/watcher_acme_authority_pin_test.go:TestWatcher_NoDirectEtcdAgainstACMECerts
    file: internal/xds/watchers/watcher_acme_authority_pin_test.go
    symbol: TestWatcher_NoDirectEtcdAgainstACMECerts
    package: watchers
    language: go
    doc: "TestWatcher_NoDirectEtcdAgainstACMECerts pins the v1.2.180 refactor\nthat removed xDS's etcd Watch on /globular/acme/certs/* — that\nprefix is owned by the domain service\n(services/golang/domain/reconciler.go::publishCertToEtcd), and node_agent\nalready syncs etcd → local disk under /var/lib/globular/pki/acme/.\nxDS now detects ACME rotation via a periodic hash-walk of that local\ndirectory (watchACMECertDirectory).\n\nThis test fails if a future contributor reintroduces:\n  - a direct etcd Get / Put / Delete / Watch against\n    /globular/acme/* in watcher.go.\n\nThe clientv3 import is NOT pinned for removal in watcher.go: other\nopen-violation paths (loadExternalDomains, buildServiceResourcesFromEtcd)\nstill legitimately use it pending their own ratchets."
  - id: internal/xds/watchers/watcher_domains_authority_pin_test.go:TestWatcher_LoadExternalDomains_NoDirectEtcd
    file: internal/xds/watchers/watcher_domains_authority_pin_test.go
    symbol: TestWatcher_LoadExternalDomains_NoDirectEtcd
    package: watchers
    language: go
    doc: "TestWatcher_LoadExternalDomains_NoDirectEtcd pins the v1.2.181/182\nrefactor that moved xDS off the raw /globular/domains/v1/* + per-\nFQDN /status etcd reads onto cluster_controller.ListExternalDomains.\n\nThat prefix is owned by the controller's embedded domain reconciler\n(services/golang/domain/reconciler.go), so xDS reading raw etcd\nviolated invariant:four_layer.truth_read_via_owner_rpc_not_direct_storage.\n\nThis test fails if the loadExternalDomains function body\nreintroduces a direct etcd Get/Put/Delete/Watch against\n/globular/domains/* — even if the file as a whole retains\nclientv3 for other paths (buildServiceResourcesFromEtcd is still\npending its own ratchet)."
  - id: internal/xds/watchers/watcher_legacy_ingress_authority_pin_test.go:TestParseEtcdIngress_SelfOwnedPrefixOnly
    file: internal/xds/watchers/watcher_legacy_ingress_authority_pin_test.go
    symbol: TestParseEtcdIngress_SelfOwnedPrefixOnly
    package: watchers
    language: go
    doc: "TestParseEtcdIngress_SelfOwnedPrefixOnly pins the one remaining direct etcd\nread path in xDS: the legacy bootstrap parser for /globular/xds/v1/*.\n\nThis is allowed because xDS owns that prefix and the parser is read-only. The\ntest exists so future edits cannot quietly widen that exception onto foreign\nowner prefixes such as /globular/services/*, /globular/domains/*, or\n/globular/pki/*."
  - id: internal/xds/watchers/watcher_legacy_ingress_authority_pin_test.go:TestWatcher_IngressFromEtcd_DelegatesToOwnedParser
    file: internal/xds/watchers/watcher_legacy_ingress_authority_pin_test.go
