  - id: internal/xds/watchers/watcher_pki_authority_pin_test.go:TestWatcher_NoCheckCertificateGeneration
    file: internal/xds/watchers/watcher_pki_authority_pin_test.go
    symbol: TestWatcher_NoCheckCertificateGeneration
    package: watchers
    language: go
    doc: "TestWatcher_NoCheckCertificateGeneration pins the v1.2.178 removal\nof watcher.checkCertificateGeneration. That function polled\n/globular/pki/bundles/{domain} directly from etcd as a fallback\nwhen w.certReconciler was nil. The fallback violated\ninvariant:four_layer.truth_read_via_owner_rpc_not_direct_storage\n(PKI is owned by the security/PKI service) and was a no-op in\npractice because both it and the reconciler share the same\nw.etcdClient prerequisite.\n\nThis test fails if a future contributor reintroduces:\n  - the checkCertificateGeneration function name in watcher.go, or\n  - any direct etcd Get / Put / Delete / Watch against\n    /globular/pki/* in watcher.go.\n\n(cert_reconciler.go is intentionally NOT pinned here — that file\nstill legitimately watches PKI for cluster-internal CA rotation\nevents; it's the next ratchet target. When that ratchet lands,\nextend this pin to cover cert_reconciler.go too.)"
  - id: internal/xds/watchers/watcher_reconciler_test.go:TestCertReconcilerCreatesWhenACMEConfigured
    file: internal/xds/watchers/watcher_reconciler_test.go
    symbol: TestCertReconcilerCreatesWhenACMEConfigured
    package: watchers
    language: go
    doc: "TestCertReconcilerCreatesWhenACMEConfigured asserts that the\nreconciler is created as soon as any cert source (internal or\nACME) is available. v1.2.179: the prior wait-for-cluster-domain\nbranch is gone — initializeCertReconciler no longer needs a\ncluster domain because cert change detection moved off the\n/globular/pki/bundles/{domain} etcd key onto filesystem paths\nthat are domain-independent (service.crt / service.key / ca.crt\nlive under the same well-known directory regardless of cluster\ndomain)."
  - id: internal/xds/watchers/watcher_services_authority_pin_test.go:TestWatcher_BuildServiceResources_NoDirectEtcd
    file: internal/xds/watchers/watcher_services_authority_pin_test.go
    symbol: TestWatcher_BuildServiceResources_NoDirectEtcd
    package: watchers
    language: go
    doc: "TestWatcher_BuildServiceResources_NoDirectEtcd pins the v1.2.182\nrefactor that moved xDS off the raw /globular/services/* etcd\nscan onto cluster_controller.ListServices.\n\nThat prefix is owned by the cluster_controller (writers\nconfig.PutInstance / config.PutConfig in\nservices/golang/config/etcd_service_config.go), so xDS reading\nraw etcd violated\ninvariant:four_layer.truth_read_via_owner_rpc_not_direct_storage.\n\nThis test fails if the buildServiceResourcesFromEtcd function body\nreintroduces:\n  - a direct etcd Get/Put/Delete/Watch against /globular/services/*, or\n  - a clientv3.New call (re-creating the etcd client locally)."
